name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint (includes gosec)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0

      - name: Check generated manifests are up to date
        run: |
          make manifests
          git diff --exit-code

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build operator
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build ./cmd/operator/...

      - name: Build node agent
        env:
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: go build ./cmd/agent/...

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install setup-envtest
        run: |
          go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run tests
        run: |
          KUBEBUILDER_ASSETS=$(setup-envtest use -p path) \
            go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  e2e:
    if: vars.E2E_RUNNER_LABEL != ''
    runs-on: ${{ vars.E2E_RUNNER_LABEL }}
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create Talos cluster
        run: talosctl cluster create --provisioner docker --name imp-e2e

      - name: Apply CRDs
        run: kubectl apply -f config/crd/bases/

      - name: Run E2E tests
        run: go test -v -tags e2e ./test/e2e/...

      - name: Cleanup
        if: always()
        run: talosctl cluster destroy --name imp-e2e

  e2e-kind:
    name: E2E (Kind)
    runs-on: ubuntu-latest
    needs: [lint, build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: helm/kind-action@v1
        with:
          cluster_name: imp-e2e

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run E2E tests
        run: go test -tags e2e ./test/e2e/... -v -timeout 15m -ginkgo.label-filter="smoke"
