name: Nightly E2E Cilium Heavy (Kind)

on:
  schedule:
    # 03:00 UTC on Mon/Wed/Fri
    - cron: "0 3 * * 1,3,5"
  workflow_dispatch:

concurrency:
  group: nightly-e2e-kind-cilium-heavy
  cancel-in-progress: false

env:
  GO_VERSION: "1.25"

jobs:
  e2e-kind-cilium-heavy:
    name: E2E (Kind+Cilium heavy)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - uses: helm/kind-action@v1
        with:
          cluster_name: imp-cilium-heavy
          config: test/e2e/kind-cilium.yaml

      - name: Install Cilium CLI
        run: |
          CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
          CLI_ARCH=amd64
          if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
          curl -L --fail --remote-name-all \
            "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz" \
            "https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz.sha256sum"
          sha256sum --check "cilium-linux-${CLI_ARCH}.tar.gz.sha256sum"
          sudo tar xzvfC "cilium-linux-${CLI_ARCH}.tar.gz" /usr/local/bin
          rm -f "cilium-linux-${CLI_ARCH}.tar.gz" "cilium-linux-${CLI_ARCH}.tar.gz.sha256sum"

      - name: Install Cilium
        run: |
          cilium install --wait
          cilium status --wait

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run heavy Cilium E2E tests (retry once)
        run: |
          set -euo pipefail
          FILTER='nightly-cilium'
          if ! go test -tags e2e ./test/e2e/... -v -timeout 45m -ginkgo.label-filter="${FILTER}"; then
            echo "First run failed; retrying once..."
            go test -tags e2e ./test/e2e/... -v -timeout 45m -ginkgo.label-filter="${FILTER}"
          fi

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p artifacts
          kubectl get nodes -o wide > artifacts/nodes.txt || true
          kubectl get pods -A -o wide > artifacts/pods-all.txt || true
          kubectl get events -A --sort-by=.lastTimestamp > artifacts/events.txt || true
          kubectl -n imp-system get all > artifacts/imp-system-all.txt || true
          kubectl -n imp-system describe pods > artifacts/imp-system-pods-describe.txt || true
          kubectl -n imp-system logs deploy/imp-operator --all-containers > artifacts/imp-operator-logs.txt || true
          kubectl -n imp-system logs ds/imp-agent --all-containers > artifacts/imp-agent-logs.txt || true
          cilium status > artifacts/cilium-status.txt || true
          cilium connectivity status > artifacts/cilium-connectivity-status.txt || true

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-kind-cilium-heavy-diagnostics
          path: artifacts/
