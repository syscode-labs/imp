name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (e.g. v0.2.0)"
        required: false
        type: string

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/syscode-labs

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate CRD manifests
        run: make manifests

      - name: Build context note
        run: |
          echo "::notice title=Multi-arch build note::linux/arm64 is built via QEMU emulation on an amd64 runner. This phase can be slow and may appear quiet for several minutes."

      - name: Build and push operator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/imp-operator:${{ github.event.release.tag_name || inputs.release_tag }}
            ${{ env.IMAGE_BASE }}/imp-operator:latest

      - name: Build and push node agent image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/imp-agent:${{ github.event.release.tag_name || inputs.release_tag }}
            ${{ env.IMAGE_BASE }}/imp-agent:latest
