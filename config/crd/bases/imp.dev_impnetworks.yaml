---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: impnetworks.imp.dev
spec:
  group: imp.dev
  names:
    categories:
    - imp
    kind: ImpNetwork
    listKind: ImpNetworkList
    plural: impnetworks
    shortNames:
    - impnet
    singular: impnetwork
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.subnet
      name: Subnet
      type: string
    - jsonPath: .spec.nat.enabled
      name: NAT
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ImpNetwork is the Schema for the impnetworks API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImpNetworkSpec defines a virtual network shared by one or
              more VMs.
            properties:
              cilium:
                description: |-
                  Cilium holds Cilium-specific integration settings.
                  Only relevant when the cluster CNI is Cilium.
                properties:
                  excludeFromIPAM:
                    description: ExcludeFromIPAM tells Cilium not to manage IP allocation
                      for this subnet.
                    type: boolean
                  masqueradeViaCilium:
                    description: |-
                      MasqueradeViaCilium delegates outbound masquerade to Cilium's ipMasqAgent.
                      Requires Cilium ipMasqAgent to be configured with this subnet.
                    type: boolean
                type: object
              dns:
                description: DNS lists the nameservers injected into VMs on this network.
                items:
                  type: string
                type: array
              gateway:
                description: |-
                  Gateway is the default gateway IP for VMs on this network.
                  Defaults to the first usable host address in Subnet if unset.
                type: string
              groups:
                description: |-
                  Groups defines named VM groups that share subnets within this network.
                  VMs not in any group receive an isolated /30 CIDR.
                items:
                  description: NetworkGroupSpec defines a named group of VMs sharing
                    a subnet within an ImpNetwork.
                  properties:
                    connectivity:
                      default: subnet
                      description: |-
                        Connectivity controls L2/L3 adjacency between group members.
                        "subnet" places all members on the same subnet (default).
                        "policy-only" uses group identity for policy without L2 adjacency.
                      enum:
                      - subnet
                      - policy-only
                      type: string
                    expectedSize:
                      default: 14
                      description: |-
                        ExpectedSize is a hint for CIDR sizing.
                        The controller rounds up to the next power-of-2 subnet.
                        Isolated VMs (no group) always receive a /30.
                        Default: 14 → /28.
                      format: int32
                      type: integer
                    name:
                      description: Name identifies this group. ImpVMs reference this
                        name via spec.networkGroup.
                      type: string
                  required:
                  - name
                  type: object
                type: array
              ipam:
                description: |-
                  IPAM configures the IP address management backend for this network.
                  Defaults to "internal" (Imp's built-in allocator).
                properties:
                  cilium:
                    description: Cilium configures Cilium IPAM. Required when Provider
                      is "cilium".
                    properties:
                      cidr:
                        description: |-
                          Cidr overrides the CIDR used when Imp auto-creates the CiliumPodIPPool.
                          Defaults to ImpNetwork.spec.subnet when unset.
                        pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                        type: string
                      poolRef:
                        description: |-
                          PoolRef is the name of the CiliumPodIPPool resource to allocate from.
                          Imp creates and owns this pool automatically; it need not exist beforehand.
                        type: string
                    required:
                    - poolRef
                    type: object
                  provider:
                    default: internal
                    description: |-
                      Provider selects the IPAM backend.
                      "internal" uses Imp's built-in allocator.
                      "cilium" delegates to a CiliumPodIPPool.
                    enum:
                    - internal
                    - cilium
                    type: string
                type: object
              nat:
                description: NAT configures masquerade/SNAT for outbound VM traffic.
                properties:
                  egressInterface:
                    description: |-
                      EgressInterface is the host network interface used for NAT.
                      The node agent auto-detects the default route interface if unset.
                    type: string
                  enabled:
                    description: Enabled turns on MASQUERADE/SNAT for outbound traffic.
                    type: boolean
                required:
                - enabled
                type: object
              subnet:
                description: Subnet is the CIDR block for this network (e.g. "192.168.100.0/24").
                pattern: ^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$
                type: string
            required:
            - subnet
            type: object
          status:
            description: ImpNetworkStatus reflects the observed state of an ImpNetwork.
            properties:
              allocatedIPs:
                description: AllocatedIPs tracks IP addresses currently assigned to
                  ImpVMs on this network.
                items:
                  type: string
                type: array
              conditions:
                description: Conditions follow the standard k8s condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              groupCIDRs:
                description: |-
                  GroupCIDRs contains the allocated subnet CIDR for each network group in spec.groups.
                  Populated and maintained by the controller; do not edit manually.
                items:
                  description: GroupCIDR records the subnet CIDR allocated to a named
                    network group.
                  properties:
                    cidr:
                      description: CIDR is the subnet allocated for this group (e.g.
                        "10.44.0.0/28").
                      type: string
                    name:
                      description: Name is the group name (matches spec.groups[].name).
                      type: string
                  required:
                  - cidr
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
              vtepTable:
                description: |-
                  VTEPTable contains VTEP entries for cross-node VXLAN FDB population.
                  Each entry maps a VM's IP and MAC to the node IP hosting it.
                items:
                  description: |-
                    VTEPEntry maps a VM's IP and MAC to the node IP that hosts it.
                    Used by the VXLAN FDB to route cross-node VM traffic.
                  properties:
                    nodeIP:
                      description: NodeIP is the IP address of the node hosting the
                        VM.
                      type: string
                    vmIP:
                      description: VMIP is the IP address of the VM.
                      type: string
                    vmMAC:
                      description: VMMAC is the MAC address of the VM's TAP interface.
                      type: string
                  required:
                  - nodeIP
                  - vmIP
                  - vmMAC
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - vmIP
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
