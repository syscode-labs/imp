---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - nodes
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - imp.dev
  resources:
  - clusterimpconfigs
  - clusterimpnodeprofiles
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - imp.dev
  resources:
  - impnetworks
  - impvms
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - imp.dev
  resources:
  - impnetworks/finalizers
  - impvms/finalizers
  verbs:
  - update
- apiGroups:
  - imp.dev
  resources:
  - impnetworks/status
  - impvms/status
  verbs:
  - get
  - patch
  - update
