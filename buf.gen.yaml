version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/syscode-labs/imp
plugins:
  - local: protoc-gen-go
    out: internal/proto
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/proto
    opt: paths=source_relative
