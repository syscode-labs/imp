---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    "helm.sh/resource-policy": keep
    controller-gen.kubebuilder.io/version: v0.20.1
  name: impvmclasses.imp.dev
spec:
  group: imp.dev
  names:
    categories:
    - imp
    kind: ImpVMClass
    listKind: ImpVMClassList
    plural: impvmclasses
    shortNames:
    - impcls
    singular: impvmclass
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.vcpu
      name: VCPU
      type: integer
    - jsonPath: .spec.memoryMiB
      name: Memory
      type: integer
    - jsonPath: .spec.diskGiB
      name: Disk
      type: integer
    - jsonPath: .spec.arch
      name: Arch
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ImpVMClass is the Schema for the impvmclasses API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ImpVMClassSpec defines compute resources for a class of VMs.
              All ImpVMs and ImpVMTemplates referencing this class inherit these values.
            properties:
              arch:
                default: multi
                description: |-
                  Arch is the CPU architecture this class targets.
                  Use "multi" to allow scheduling on either amd64 or arm64 nodes.
                enum:
                - amd64
                - arm64
                - multi
                type: string
              diskGiB:
                description: DiskGiB is the root disk size in gibibytes.
                format: int32
                minimum: 1
                type: integer
              guestAgent:
                description: GuestAgent controls guest agent injection. Overrides
                  defaults when set.
                properties:
                  enabled:
                    description: Enabled controls guest agent injection. Defaults
                      to true when omitted.
                    type: boolean
                type: object
              memoryMiB:
                description: MemoryMiB is the amount of RAM in mebibytes.
                format: int32
                minimum: 128
                type: integer
              probes:
                description: |-
                  Probes defines default probes for VMs using this class.
                  Can be overridden by ImpVMTemplate or ImpVM.
                properties:
                  httpCheck:
                    description: HTTPCheck configures an optional operator-driven
                      HTTP health check (opt-in).
                    properties:
                      enabled:
                        description: Enabled turns on the operator HTTP health check.
                        type: boolean
                      failureThreshold:
                        default: 3
                        description: FailureThreshold is the number of consecutive
                          failures before marking Ready=False.
                        format: int32
                        type: integer
                      intervalSeconds:
                        default: 10
                        description: IntervalSeconds is how often the operator checks
                          the endpoint.
                        format: int32
                        type: integer
                      path:
                        default: /healthz
                        description: Path is the HTTP path to GET. Defaults to /healthz.
                        type: string
                      port:
                        description: Port is the TCP port to check.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                    type: object
                  livenessProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                  readinessProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                  startupProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                type: object
              restartPolicy:
                description: RestartPolicy configures automatic restart for persistent
                  VMs using this class.
                properties:
                  backoff:
                    description: Backoff configures exponential backoff between restart
                      attempts.
                    properties:
                      initialDelay:
                        default: 10s
                        description: InitialDelay is the delay before the first restart
                          attempt.
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                        type: string
                      maxDelay:
                        default: 5m
                        description: MaxDelay caps the exponential backoff.
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                        type: string
                      maxRetries:
                        default: 5
                        description: MaxRetries is the maximum number of restart attempts
                          before OnExhaustion applies.
                        format: int32
                        type: integer
                    type: object
                  coolDownPeriod:
                    default: 1h
                    description: |-
                      CoolDownPeriod is the duration before the retry counter resets automatically.
                      Only used when OnExhaustion is "cool-down".
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                    type: string
                  mode:
                    default: in-place
                    description: |-
                      Mode controls where the VM restarts after failure.
                      "in-place" restarts on the same node. "reschedule" re-runs the scheduler.
                    enum:
                    - in-place
                    - reschedule
                    type: string
                  onExhaustion:
                    default: fail
                    description: OnExhaustion controls behaviour once Backoff.MaxRetries
                      is exhausted.
                    enum:
                    - fail
                    - manual-reset
                    - cool-down
                    type: string
                type: object
              tolerations:
                description: |-
                  Tolerations specify tolerations inherited by all VMs of this class.
                  Merged additively with per-VM tolerations at schedule time.
                  Same semantics as Pod.spec.tolerations.
                items:
                  description: |-
                    The pod this Toleration is attached to tolerates any taint that matches
                    the triple <key,value,effect> using the matching operator <operator>.
                  properties:
                    effect:
                      description: |-
                        Effect indicates the taint effect to match. Empty means match all taint effects.
                        When specified, allowed values are NoSchedule, PreferNoSchedule and NoExecute.
                      type: string
                    key:
                      description: |-
                        Key is the taint key that the toleration applies to. Empty means match all taint keys.
                        If the key is empty, operator must be Exists; this combination means to match all values and all keys.
                      type: string
                    operator:
                      description: |-
                        Operator represents a key's relationship to the value.
                        Valid operators are Exists, Equal, Lt, and Gt. Defaults to Equal.
                        Exists is equivalent to wildcard for value, so that a pod can
                        tolerate all taints of a particular category.
                        Lt and Gt perform numeric comparisons (requires feature gate TaintTolerationComparisonOperators).
                      type: string
                    tolerationSeconds:
                      description: |-
                        TolerationSeconds represents the period of time the toleration (which must be
                        of effect NoExecute, otherwise this field is ignored) tolerates the taint. By default,
                        it is not set, which means tolerate the taint forever (do not evict). Zero and
                        negative values will be treated as 0 (evict immediately) by the system.
                      format: int64
                      type: integer
                    value:
                      description: |-
                        Value is the taint value the toleration matches to.
                        If the operator is Exists, the value should be empty, otherwise just a regular string.
                      type: string
                  type: object
                type: array
              vcpu:
                description: VCPU is the number of virtual CPUs allocated to each
                  VM.
                format: int32
                minimum: 1
                type: integer
            required:
            - diskGiB
            - memoryMiB
            - vcpu
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
