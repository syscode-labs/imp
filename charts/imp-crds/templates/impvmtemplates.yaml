---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    "helm.sh/resource-policy": keep
    controller-gen.kubebuilder.io/version: v0.20.1
  name: impvmtemplates.imp.dev
spec:
  group: imp.dev
  names:
    categories:
    - imp
    kind: ImpVMTemplate
    listKind: ImpVMTemplateList
    plural: impvmtemplates
    shortNames:
    - impvmt
    singular: impvmtemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.classRef.name
      name: Class
      type: string
    - jsonPath: .spec.networkRef.name
      name: Network
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ImpVMTemplate is the Schema for the impvmtemplates API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ImpVMTemplateSpec defines a reusable VM blueprint.
            properties:
              ciliumLayer:
                description: |-
                  CiliumLayer is an optional OCI image whose filesystem layers are composited
                  on top of the base image (after RunnerLayer if also set) before building
                  the ext4 rootfs. Used to inject the cilium-agent binary for Cilium mesh
                  enrollment.
                type: string
              classRef:
                description: ClassRef is the required compute class for VMs created
                  from this template.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              guestAgent:
                description: GuestAgent controls guest agent injection. Overrides
                  defaults when set.
                properties:
                  enabled:
                    description: Enabled controls guest agent injection. Defaults
                      to true when omitted.
                    type: boolean
                type: object
              image:
                description: Image is the OCI image to use as the VM rootfs.
                type: string
              networkGroup:
                description: NetworkGroup places VMs from this template in a named
                  group.
                type: string
              networkRef:
                description: NetworkRef optionally binds VMs to a specific ImpNetwork.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              probes:
                description: Probes overrides probes inherited from the ImpVMClass.
                properties:
                  httpCheck:
                    description: HTTPCheck configures an optional operator-driven
                      HTTP health check (opt-in).
                    properties:
                      enabled:
                        description: Enabled turns on the operator HTTP health check.
                        type: boolean
                      failureThreshold:
                        default: 3
                        description: FailureThreshold is the number of consecutive
                          failures before marking Ready=False.
                        format: int32
                        type: integer
                      intervalSeconds:
                        default: 10
                        description: IntervalSeconds is how often the operator checks
                          the endpoint.
                        format: int32
                        type: integer
                      path:
                        default: /healthz
                        description: Path is the HTTP path to GET. Defaults to /healthz.
                        type: string
                      port:
                        description: Port is the TCP port to check.
                        format: int32
                        maximum: 65535
                        minimum: 1
                        type: integer
                    type: object
                  livenessProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                  readinessProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                  startupProbe:
                    description: Probe defines a single probe. Only one of Exec or
                      HTTP may be set.
                    properties:
                      exec:
                        description: ExecAction runs a command inside the VM via VSOCK
                          guest agent.
                        properties:
                          command:
                            items:
                              type: string
                            minItems: 1
                            type: array
                        required:
                        - command
                        type: object
                      failureThreshold:
                        default: 3
                        format: int32
                        type: integer
                      http:
                        description: HTTPGetAction performs an HTTP GET against the
                          VM's guest agent.
                        properties:
                          path:
                            type: string
                          port:
                            format: int32
                            maximum: 65535
                            minimum: 1
                            type: integer
                        required:
                        - path
                        - port
                        type: object
                      initialDelaySeconds:
                        default: 0
                        format: int32
                        type: integer
                      periodSeconds:
                        default: 10
                        format: int32
                        type: integer
                    type: object
                type: object
              restartPolicy:
                description: RestartPolicy overrides the class-level restart policy
                  for this template.
                properties:
                  backoff:
                    description: Backoff configures exponential backoff between restart
                      attempts.
                    properties:
                      initialDelay:
                        default: 10s
                        description: InitialDelay is the delay before the first restart
                          attempt.
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                        type: string
                      maxDelay:
                        default: 5m
                        description: MaxDelay caps the exponential backoff.
                        pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                        type: string
                      maxRetries:
                        default: 5
                        description: MaxRetries is the maximum number of restart attempts
                          before OnExhaustion applies.
                        format: int32
                        type: integer
                    type: object
                  coolDownPeriod:
                    default: 1h
                    description: |-
                      CoolDownPeriod is the duration before the retry counter resets automatically.
                      Only used when OnExhaustion is "cool-down".
                    pattern: ^([0-9]+(\.[0-9]+)?(ns|us|ms|s|m|h))+$
                    type: string
                  mode:
                    default: in-place
                    description: |-
                      Mode controls where the VM restarts after failure.
                      "in-place" restarts on the same node. "reschedule" re-runs the scheduler.
                    enum:
                    - in-place
                    - reschedule
                    type: string
                  onExhaustion:
                    default: fail
                    description: OnExhaustion controls behaviour once Backoff.MaxRetries
                      is exhausted.
                    enum:
                    - fail
                    - manual-reset
                    - cool-down
                    type: string
                type: object
              runnerLayer:
                description: |-
                  RunnerLayer is an optional OCI image whose filesystem layers are composited
                  on top of the base image before building the ext4 rootfs. Used to inject
                  CI runner binaries (GitHub Actions runner, gitlab-runner, etc.) without
                  modifying the base image.
                type: string
            required:
            - classRef
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
