suite: operator Deployment and Service
templates:
  - templates/operator/deployment.yaml
  - templates/operator/service.yaml
tests:
  - it: renders Deployment with correct image
    template: templates/operator/deployment.yaml
    set:
      agent.env.kernelPath: /usr/local/bin/firecracker
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/syscode-labs/imp-operator:0.1.0
      - equal:
          path: spec.replicas
          value: 1

  - it: uses custom image tag when set
    template: templates/operator/deployment.yaml
    set:
      agent.env.kernelPath: /usr/local/bin/firecracker
      operator.image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/syscode-labs/imp-operator:v1.2.3

  - it: mounts webhook TLS secret
    template: templates/operator/deployment.yaml
    set:
      agent.env.kernelPath: /usr/local/bin/firecracker
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: webhook-tls
            secret:
              secretName: RELEASE-NAME-imp-webhook-tls

  - it: renders Service with webhook and metrics ports
    template: templates/operator/service.yaml
    asserts:
      - isKind:
          of: Service
      - contains:
          path: spec.ports
          content:
            name: webhook
            port: 9443
            targetPort: 9443
      - contains:
          path: spec.ports
          content:
            name: metrics
            port: 8080
            targetPort: 8080

  - it: disables webhook mount and flag when certManager is disabled
    template: templates/operator/deployment.yaml
    set:
      agent.env.kernelPath: /usr/local/bin/firecracker
      webhook.certManager.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: webhook-tls
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: webhook-tls
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhooks=false

  - it: omits webhook service port when certManager is disabled
    template: templates/operator/service.yaml
    set:
      webhook.certManager.enabled: false
    asserts:
      - notContains:
          path: spec.ports
          content:
            name: webhook
            port: 9443
            targetPort: 9443

  - it: renders explicit false webhook flag when webhook.enabled is absent
    template: templates/operator/deployment.yaml
    set:
      webhook.enabled: null
      webhook.certManager.enabled: false
      agent.env.kernelPath: /usr/local/bin/firecracker
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: --enable-webhooks=false
