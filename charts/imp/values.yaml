nameOverride: ""
fullnameOverride: ""
imagePullSecrets: []

operator:
  image:
    repository: ghcr.io/syscode-labs/imp-operator
    tag: ""
    pullPolicy: IfNotPresent
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi
  nodeSelector: {}
  rbac:
    cniDetection: minimal
  extraEnv: []

agent:
  image:
    repository: ghcr.io/syscode-labs/imp-agent
    tag: ""
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 64Mi
    limits:
      memory: 128Mi
  nodeSelector: {}
  tolerations: []
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  env:
    kernelPath: ""
  extraEnv: []
  hostPaths:
    socketDir:
      # enabled: true ensures sockets survive agent pod restarts (required for
      # PID-based reattach). Setting this to false will orphan Firecracker
      # sockets on restart — breaking graceful stop for running VMs.
      enabled: true
      path: /run/imp/sockets
    imageCache:
      enabled: false
      path: /var/lib/imp/images

webhook:
  certManager:
    enabled: true
    issuerRef: {}
    duration: 8760h
    renewBefore: 720h

metrics:
  serviceMonitor:
    enabled: true
    interval: 30s
  podMonitor:
    enabled: true
    interval: 30s

grafana:
  enabled: false
  dashboardLabel:
    key: grafana_dashboard
    value: "1"
  namespace: ""
  tempo:
    datasourceUid: ""   # optional: pre-fill the Tempo datasource UID

plugin:
  rbac:
    # readonly: grants access for imp status, imp logs, imp metrics, imp exec
    readonly:
      enabled: true
    # admin: superset of readonly; also grants imp kill, imp migrate, imp elect
    admin:
      enabled: true
