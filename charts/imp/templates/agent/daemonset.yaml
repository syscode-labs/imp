apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "imp.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "imp.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      {{- include "imp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: agent
  updateStrategy:
    {{- toYaml .Values.agent.updateStrategy | nindent 4 }}
  template:
    metadata:
      labels:
        {{- include "imp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: agent
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "imp.agent.serviceAccountName" . }}
      {{- with .Values.agent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.agent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: agent
        image: {{ include "imp.agent.image" . }}
        imagePullPolicy: {{ .Values.agent.image.pullPolicy | quote }}
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: NODE_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: OTEL_SERVICE_NAME
          value: imp-agent
        - name: FC_KERNEL
          value: {{ .Values.agent.env.kernelPath | required "agent.env.kernelPath is required" | quote }}
        {{- with .Values.agent.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        ports:
        - name: metrics
          containerPort: 9090
          protocol: TCP
        resources:
          {{- toYaml .Values.agent.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.agent.securityContext | nindent 10 }}
        volumeMounts:
        - name: dev-kvm
          mountPath: /dev/kvm
        - name: socket-dir
          mountPath: /run/imp/sockets
        - name: image-cache
          mountPath: /var/lib/imp/images
      volumes:
      - name: dev-kvm
        hostPath:
          path: /dev/kvm
          type: CharDevice
      - name: socket-dir
        {{- if .Values.agent.hostPaths.socketDir.enabled }}
        hostPath:
          path: {{ .Values.agent.hostPaths.socketDir.path | quote }}
          type: DirectoryOrCreate
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: image-cache
        {{- if .Values.agent.hostPaths.imageCache.enabled }}
        hostPath:
          path: {{ .Values.agent.hostPaths.imageCache.path | quote }}
          type: DirectoryOrCreate
        {{- else }}
        emptyDir: {}
        {{- end }}
      terminationGracePeriodSeconds: 10
