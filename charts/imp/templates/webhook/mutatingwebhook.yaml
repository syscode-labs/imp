{{- if .Values.webhook.certManager.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "imp.fullname" . }}-mutating-webhooks
  labels:
    {{- include "imp.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "imp.fullname" . }}-webhook-tls
webhooks:
- name: mimpvm.kb.io
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ include "imp.fullname" . }}-operator
      namespace: {{ .Release.Namespace }}
      port: 9443
      path: /mutate-imp-dev-v1alpha1-impvm
  rules:
  - apiGroups: ["imp.dev"]
    apiVersions: ["v1alpha1"]
    operations:
      - CREATE
      - UPDATE
    resources: [impvms]
    scope: Namespaced
  failurePolicy: Fail
  sideEffects: None
{{- end }}
