apiVersion: v1
kind: Service
metadata:
  name: {{ include "imp.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "imp.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  selector:
    {{- include "imp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
  ports:
  - name: webhook
    port: 9443
    targetPort: 9443
  - name: metrics
    port: 8080
    targetPort: 8080
