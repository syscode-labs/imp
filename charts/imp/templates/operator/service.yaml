{{- $webhookEnabled := default true .Values.webhook.enabled }}
{{- $webhooksEnabled := and $webhookEnabled .Values.webhook.certManager.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "imp.fullname" . }}-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "imp.labels" . | nindent 4 }}
    app.kubernetes.io/component: operator
spec:
  selector:
    {{- include "imp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: operator
  ports:
  {{- if $webhooksEnabled }}
  - name: webhook
    port: 9443
    targetPort: 9443
  {{- end }}
  - name: metrics
    port: 8080
    targetPort: 8080
