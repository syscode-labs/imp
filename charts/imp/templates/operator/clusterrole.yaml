apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "imp.fullname" . }}-operator
  labels:
    {{- include "imp.labels" . | nindent 4 }}
rules:
- apiGroups: ["imp.dev"]
  resources:
    - impvms
    - impvmclasses
    - impvmtemplates
    - impnetworks
    - clusterimpconfigs
    - clusterimpnodeprofiles
  verbs: [get, list, watch, update, patch]
- apiGroups: ["imp.dev"]
  resources:
    - impvms/status
    - impnetworks/status
  verbs: [get, update, patch]
- apiGroups: ["imp.dev"]
  resources:
    - impvms/finalizers
    - impnetworks/finalizers
  verbs: [update]
- apiGroups: [""]
  resources: [nodes]
  verbs: [get, list, watch]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
- apiGroups: ["apiextensions.k8s.io"]
  resources: [customresourcedefinitions]
  verbs: [get, list]
