version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - revive
  settings:
    gosec:
      severity: medium
      confidence: medium
    revive:
      rules:
        - name: exported
          disabled: true # doc comments not required yet

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/syscode-labs/imp

issues:
  exclude-dirs:
    - test
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
