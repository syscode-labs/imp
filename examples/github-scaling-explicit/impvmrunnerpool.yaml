apiVersion: imp.dev/v1alpha1
kind: ImpVMRunnerPool
metadata:
  name: ci-runner-explicit
  namespace: default
  annotations:
    imp.dev/runner-demand: "5"
spec:
  templateName: ci-explicit-template
  platform:
    type: github-actions
    scope:
      repo: your-org/your-repo
    credentialsSecret: gh-runner-token
  scaling:
    mode: webhook
    minIdle: 0
    maxConcurrent: 10
    scaleUpStep: 2
    cooldownSeconds: 30
    webhook:
      secretRef: gh-webhook-secret
