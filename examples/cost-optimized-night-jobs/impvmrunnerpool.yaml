apiVersion: imp.dev/v1alpha1
kind: ImpVMRunnerPool
metadata:
  name: nightly-job-pool
  namespace: default
  annotations:
    imp.dev/runner-demand: "5"
spec:
  templateName: nightly-job-template
  platform:
    type: github-actions
    scope:
      repo: your-org/your-repo
    credentialsSecret: nightly-gh-token
  scaling:
    mode: webhook
    minIdle: 0
    maxConcurrent: 8
    scaleUpStep: 3
    cooldownSeconds: 30
    webhook:
      secretRef: nightly-webhook-secret
