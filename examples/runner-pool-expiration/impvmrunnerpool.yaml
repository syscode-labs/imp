apiVersion: imp.dev/v1alpha1
kind: ImpVMRunnerPool
metadata:
  name: ci-runner-expiring
  namespace: default
  annotations:
    imp.dev/runner-demand: "2"
spec:
  templateName: ci-expire-template
  expireAfter: 45m
  platform:
    type: github-actions
    scope:
      repo: your-org/your-repo
    credentialsSecret: gh-runner-token
  scaling:
    mode: webhook
    minIdle: 0
    maxConcurrent: 6
    scaleUpStep: 2
    cooldownSeconds: 30
    webhook:
      secretRef: gh-webhook-secret
